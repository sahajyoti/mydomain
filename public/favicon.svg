<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Grey rounded background -->
  <rect width="128" height="128" rx="24" fill="#6B7280"/>
  
  <!-- White circle for logo area -->
  <circle cx="64" cy="64" r="48" fill="white" opacity="0.95"/>
  
  <!-- DS Text as placeholder (you can replace with your actual logo) -->
  <text x="64" y="78" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#059669" text-anchor="middle">DS</text>
  
  <!-- Medical cross symbol -->
  <rect x="58" y="30" width="12" height="30" fill="#059669" opacity="0.3" rx="2"/>
  <rect x="46" y="42" width="36" height="12" fill="#059669" opacity="0.3" rx="2"/>
</svg>
